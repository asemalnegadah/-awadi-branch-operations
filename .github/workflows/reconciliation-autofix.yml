name: Reconciliation one-time autofix

on:
  push:
    branches:
      - feature/reconciliation-engine

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: feature/reconciliation-engine
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact type-safety patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/reconciliations/postgres-repository.ts')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  '  if (!input.reason) throw new ReconciliationBusinessRuleError("سبب التسوية إلزامي.");\n  return sql.begin(async (transaction) => {\n    await setRequestContext(transaction, context, input.reason);',
                  '  if (!input.reason) throw new ReconciliationBusinessRuleError("سبب التسوية إلزامي.");\n  const settlementReason = input.reason;\n  return sql.begin(async (transaction) => {\n    await setRequestContext(transaction, context, settlementReason);',
              ),
              (
                  '        input.reason,\n        reconciliationId,',
                  '        settlementReason,\n        reconciliationId,',
              ),
              (
                  '        input.reason,\n      ],\n    );\n\n    await transaction.unsafe(\n      `\n        UPDATE reconciliation_cases',
                  '        settlementReason,\n      ],\n    );\n\n    await transaction.unsafe(\n      `\n        UPDATE reconciliation_cases',
              ),
              (
                  '    }, input.reason);\n    return Object.freeze({ reconciliation: result, replayed: false });',
                  '    }, settlementReason);\n    return Object.freeze({ reconciliation: result, replayed: false });',
              ),
              (
                  '): { readonly sql: string; readonly parameters: readonly unknown[]; readonly targetState: ReconciliationState } {',
                  '): { readonly sql: string; readonly parameters: readonly (string | number)[]; readonly targetState: ReconciliationState } {',
              ),
              (
                  '    case "REVIEW":\n      if (state !== "PENDING_REVIEW") throw new ReconciliationConflictError("المطابقة ليست بانتظار المراجعة.");\n      return {',
                  '    case "REVIEW":\n      if (state !== "PENDING_REVIEW") throw new ReconciliationConflictError("المطابقة ليست بانتظار المراجعة.");\n      if (!input.reasonCode || !input.reasonText) {\n        throw new ReconciliationBusinessRuleError("مراجعة الفرق تتطلب تصنيف السبب ووصفه.");\n      }\n      return {',
              ),
              (
                  '    case "RETURN":\n      if (state !== "PENDING_REVIEW" && state !== "PENDING_APPROVAL") {\n        throw new ReconciliationConflictError("لا يمكن إرجاع المطابقة من حالتها الحالية.");\n      }\n      return {',
                  '    case "RETURN":\n      if (state !== "PENDING_REVIEW" && state !== "PENDING_APPROVAL") {\n        throw new ReconciliationConflictError("لا يمكن إرجاع المطابقة من حالتها الحالية.");\n      }\n      if (!input.reason) throw new ReconciliationBusinessRuleError("سبب الإرجاع إلزامي.");\n      return {',
              ),
              (
                  '    case "REJECT":\n      if (state !== "PENDING_REVIEW" && state !== "PENDING_APPROVAL") {\n        throw new ReconciliationConflictError("لا يمكن رفض المطابقة من حالتها الحالية.");\n      }\n      return {',
                  '    case "REJECT":\n      if (state !== "PENDING_REVIEW" && state !== "PENDING_APPROVAL") {\n        throw new ReconciliationConflictError("لا يمكن رفض المطابقة من حالتها الحالية.");\n      }\n      if (!input.reason) throw new ReconciliationBusinessRuleError("سبب الرفض إلزامي.");\n      return {',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, found {count}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit exact patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/reconciliations/postgres-repository.ts
          git diff --cached --check
          git commit -m "fix(reconciliations): narrow SQL parameters safely"
          git push origin HEAD:feature/reconciliation-engine
