name: Field visits SQL diagnostic

on:
  pull_request:
    paths:
      - db/migrations/**
      - db/tests/**
      - .github/workflows/field-visits-sql-diagnostic.yml

permissions:
  contents: read

concurrency:
  group: field-visits-sql-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awadi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
        with:
          show-progress: false
          persist-credentials: false
      - name: Run migrations and PostgreSQL tests in service container
        run: |
          set -euo pipefail
          container_id="$(docker ps --filter ancestor=postgres:16-alpine --format '{{.ID}}' | head -n 1)"
          test -n "$container_id"
          while IFS= read -r migration; do
            docker exec -i "$container_id" psql --quiet --username postgres --dbname awadi_test --set ON_ERROR_STOP=1 < "$migration" >/dev/null
          done < <(find db/migrations -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)
          while IFS= read -r test_file; do
            echo "TEST ${test_file}"
            docker exec -i "$container_id" psql --quiet --username postgres --dbname awadi_test --set ON_ERROR_STOP=1 < "$test_file"
          done < <(find db/tests -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)
