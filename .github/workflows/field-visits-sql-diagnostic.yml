name: Field visits SQL diagnostic

on:
  pull_request:
    paths:
      - db/migrations/**
      - db/tests/**
      - .github/workflows/field-visits-sql-diagnostic.yml

permissions:
  contents: write

concurrency:
  group: field-visits-sql-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awadi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
        with:
          show-progress: false
          persist-credentials: true
      - name: Run migrations and PostgreSQL tests in service container
        id: sql
        run: |
          set +e
          mkdir -p .diagnostics
          : > .diagnostics/field-visits-sql.log
          container_id="$(docker ps --filter ancestor=postgres:16-alpine --format '{{.ID}}' | head -n 1)"
          if [ -z "$container_id" ]; then
            echo "PostgreSQL service container not found" | tee -a .diagnostics/field-visits-sql.log
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          migration_code=0
          while IFS= read -r migration; do
            docker exec -i "$container_id" psql --quiet --username postgres --dbname awadi_test --set ON_ERROR_STOP=1 < "$migration" >> .diagnostics/field-visits-sql.log 2>&1 || { migration_code=$?; break; }
          done < <(find db/migrations -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)
          test_code=$migration_code
          if [ "$migration_code" = "0" ]; then
            while IFS= read -r test_file; do
              echo "TEST ${test_file}" >> .diagnostics/field-visits-sql.log
              docker exec -i "$container_id" psql --quiet --username postgres --dbname awadi_test --set ON_ERROR_STOP=1 < "$test_file" >> .diagnostics/field-visits-sql.log 2>&1 || { test_code=$?; break; }
            done < <(find db/tests -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)
          fi
          echo "exit_code=${test_code}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit concise diagnostic
        run: |
          set -euo pipefail
          git config user.name "awadi-ci-diagnostics"
          git config user.email "awadi-ci-diagnostics@users.noreply.github.com"
          git add .diagnostics/field-visits-sql.log
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci: capture field visits SQL diagnostic"
          git push origin HEAD:feature/field-visits-engine
      - name: Enforce SQL result
        run: test "${{ steps.sql.outputs.exit_code }}" = "0"
