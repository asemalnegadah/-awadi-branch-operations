name: Apply daily plan result fixture update

on:
  push:
    branches:
      - feature/field-visits-engine
    paths:
      - .github/workflows/apply-daily-plan-test-result.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
          show-progress: false
      - name: Patch legacy daily-plan smoke fixture
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('db/tests/0026_daily_plans_engine_smoke.sql')
          text = path.read_text()
          old = """  UPDATE daily_plans
  SET state = 'COMPLETED',
      completed_by = sales_user_id,
      completed_at = now()
  WHERE id = plan_id_value;
"""
          new = """  INSERT INTO daily_plan_item_results (
    plan_item_id,
    result_type,
    reason,
    recorded_by,
    request_id,
    idempotency_key
  ) VALUES (
    item_id_value,
    'SKIPPED',
    'نتيجة تنفيذ موثقة لاختبار دورة الخطة.',
    sales_user_id,
    gen_random_uuid(),
    'daily-plan-smoke-item-result-001'
  );

  UPDATE daily_plans
  SET state = 'COMPLETED',
      completed_by = sales_user_id,
      completed_at = now()
  WHERE id = plan_id_value;
"""
          if old not in text:
              raise SystemExit('target completion block not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/apply-daily-plan-test-result.yml
      - name: Commit fixture update
        run: |
          set -euo pipefail
          git config user.name "awadi-ci-maintainer"
          git config user.email "awadi-ci-maintainer@users.noreply.github.com"
          git add db/tests/0026_daily_plans_engine_smoke.sql .github/workflows/apply-daily-plan-test-result.yml
          git commit -m "test: require an execution result before plan completion"
          git push origin HEAD:feature/field-visits-engine
