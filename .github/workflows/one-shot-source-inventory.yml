name: One-shot source inventory

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Package repository source
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.open-next \
            --exclude=.wrangler \
            -czf awadi-source-inventory.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: awadi-source-inventory
          path: awadi-source-inventory.tar.gz
          retention-days: 1
