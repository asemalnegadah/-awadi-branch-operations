name: Reconciliation SQL type repair

on:
  push:
    branches:
      - feature/reconciliation-engine

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout reconciliation branch
        uses: actions/checkout@v7
        with:
          ref: feature/reconciliation-engine
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact PostgreSQL parameter type repair
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/reconciliations/postgres-repository.ts')
          text = path.read_text(encoding='utf-8')
          replacements = (
              (
                  '$9::bigint, $10::bigint, $11, $12,',
                  '$9::bigint, $10::bigint, $11::text, $12::text,',
              ),
              (
                  "jsonb_build_object('reconciliationId', $8, 'settlementId', $12)",
                  "jsonb_build_object('reconciliationId', $8::text, 'settlementId', $12::uuid)",
              ),
              (
                  "jsonb_build_object('idempotencyKey', $11)",
                  "jsonb_build_object('idempotencyKey', $11::text)",
              ),
          )
          for before, after in replacements:
              count = text.count(before)
              if count != 1:
                  raise SystemExit(f'expected exactly one match for {before!r}, found {count}')
              text = text.replace(before, after, 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f src/lib/reconciliations/postgres-repository-source-export.integration.test.ts
          rm -f .github/workflows/reconciliation-null-cast-autofix.yml

      - name: Commit repaired source and remove temporary machinery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(reconciliations): type PostgreSQL metadata parameters explicitly"
          git push origin HEAD:feature/reconciliation-engine
