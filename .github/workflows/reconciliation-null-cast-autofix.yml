name: Reconciliation null-cast one-time autofix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: feature/reconciliation-engine
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact nullable SQL cast patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/reconciliations/postgres-repository.ts')
          text = path.read_text(encoding='utf-8')
          old = '''          $9::bigint, $10::bigint, $11, $12,
          $13::uuid, $13::uuid, $14
'''
          new = '''          $9::bigint, $10::bigint, $11::text, $12::text,
          $13::uuid, $13::uuid, $14
'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one match, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit exact patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/reconciliations/postgres-repository.ts
          git diff --cached --check
          git commit -m "fix(reconciliations): type nullable create parameters explicitly"
          git push origin HEAD:feature/reconciliation-engine
