name: Reconciliation SQL one-time autofix

on:
  push:
    branches:
      - feature/reconciliation-engine

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: feature/reconciliation-engine
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact PL/pgSQL expression patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('db/migrations/0033_reconciliation_engine.sql')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  "OR linked_entry.direction <> CASE WHEN NEW.difference_amount_minor > 0 THEN 'DEBIT' ELSE 'CREDIT' END",
                  "OR linked_entry.direction <> (CASE WHEN NEW.difference_amount_minor > 0 THEN 'DEBIT' ELSE 'CREDIT' END)",
              ),
              (
                  "IF NEW.direction <> CASE WHEN reconciliation.difference_amount_minor > 0 THEN 'DEBIT' ELSE 'CREDIT' END",
                  "IF NEW.direction <> (CASE WHEN reconciliation.difference_amount_minor > 0 THEN 'DEBIT' ELSE 'CREDIT' END)",
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, found {count}: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit exact patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/migrations/0033_reconciliation_engine.sql
          git diff --cached --check
          git commit -m "fix(reconciliations): parenthesize PL/pgSQL CASE expressions"
          git push origin HEAD:feature/reconciliation-engine
