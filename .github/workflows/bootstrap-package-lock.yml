name: Bootstrap package lock

on:
  push:
    branches:
      - agent/batch-zero-baseline

permissions:
  contents: write

concurrency:
  group: bootstrap-package-lock-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/batch-zero-baseline
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Generate deterministic package lock
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit package lock when changed
        run: |
          set -euo pipefail
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: add deterministic npm lockfile"
          git push origin HEAD:agent/batch-zero-baseline
