name: Apply visits repository hardening

on:
  push:
    branches:
      - feature/field-visits-engine
    paths:
      - .github/workflows/apply-visits-repository-hardening.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
          show-progress: false
      - name: Patch repository
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/visits/postgres-repository.ts')
          text = path.read_text()
          import_marker = 'import {\n  FieldVisitBusinessRuleError,'
          text = text.replace(import_marker, 'import { decodeFieldVisitCursor, encodeFieldVisitCursor } from "./cursor";\nimport {\n  FieldVisitBusinessRuleError,', 1)

          start = text.index('export async function listFieldVisitsPostgres(')
          end = text.index('export async function getFieldVisitPostgres(', start)
          replacement = '''export async function listFieldVisitsPostgres(
  sql: Sql,
  filters: FieldVisitListFilters,
  representativeScopeId?: string,
): Promise<FieldVisitPage> {
  const cursor = decodeFieldVisitCursor(filters.cursor);
  const rows = await sql.unsafe<VisitRow[]>(
    `${visitSelect}
     WHERE ($1::uuid IS NULL OR visit.representative_id = $1::uuid)
       AND ($2::uuid IS NULL OR visit.representative_id = $2::uuid)
       AND ($3::uuid IS NULL OR visit.customer_id = $3::uuid)
       AND ($4::text IS NULL OR visit.state = $4)
       AND ($5::date IS NULL OR COALESCE(visit.arrived_at, visit.created_at)::date >= $5::date)
       AND ($6::date IS NULL OR COALESCE(visit.arrived_at, visit.created_at)::date <= $6::date)
       AND (
         $7::timestamptz IS NULL
         OR visit.created_at < $7::timestamptz
         OR (visit.created_at = $7::timestamptz AND visit.id < $8::uuid)
       )
     ORDER BY visit.created_at DESC, visit.id DESC
     LIMIT $9`,
    [
      representativeScopeId ?? null,
      filters.representativeId ?? null,
      filters.customerId ?? null,
      filters.state ?? null,
      filters.visitDateFrom ?? null,
      filters.visitDateTo ?? null,
      cursor?.createdAt ?? null,
      cursor?.id ?? null,
      filters.limit + 1,
    ],
  );
  const hasMore = rows.length > filters.limit;
  const selected = hasMore ? rows.slice(0, filters.limit) : rows;
  const last = selected.at(-1);
  return Object.freeze({
    items: Object.freeze(selected.map(mapVisitRow)),
    nextCursor: hasMore && last
      ? encodeFieldVisitCursor({ createdAt: iso(last.created_at), id: last.id })
      : null,
  });
}

'''
          text = text[:start] + replacement + text[end:]

          submit_start = text.index('export async function submitFieldVisitPostgres(')
          submit_end = text.index('export async function verifyFieldVisitPostgres(', submit_start)
          text = text[:submit_start] + text[submit_end:]

          text = text.replace(
            'eventType: "CHECKED_IN" | "CHECKED_OUT" | "SUBMITTED" | "VERIFIED" | "RETURNED" | "CANCELLED",',
            'eventType: "CHECKED_IN" | "CHECKED_OUT" | "VERIFIED" | "RETURNED" | "CANCELLED",',
          )
          path.write_text(text)
          PY
          rm .github/workflows/apply-visits-repository-hardening.yml
      - name: Verify and commit
        run: |
          npm ci --no-audit --no-fund
          npm run typecheck
          npm run test
          git config user.name "awadi-ci-maintainer"
          git config user.email "awadi-ci-maintainer@users.noreply.github.com"
          git add src/lib/visits/postgres-repository.ts .github/workflows/apply-visits-repository-hardening.yml
          git commit -m "fix: stabilize visit pagination and remove unsafe submit path"
          git push origin HEAD:feature/field-visits-engine
