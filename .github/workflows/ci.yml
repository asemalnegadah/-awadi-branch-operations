name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"
      - "chore/**"
      - "feat/**"
      - "feature/**"
      - "fix/**"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_review_fixes:
    name: Apply verified payment promise review fixes
    if: github.ref == 'refs/heads/feature/payment-promises-engine' || github.head_ref == 'feature/payment-promises-engine'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout review branch
        uses: actions/checkout@v5
        with:
          ref: feature/payment-promises-engine
          fetch-depth: 0

      - name: Verify and apply review fixes
        if: hashFiles('.review-fix/part08') != ''
        run: |
          exec > >(tee /tmp/review-fix.log) 2>&1
          set -euo pipefail
          parts=(.review-fix/part{00..08})
          for part in "${parts[@]}"; do
            test -f "$part"
          done
          cat "${parts[@]}" > /tmp/review-fixes-full.patch
          wc -c /tmp/review-fixes-full.patch
          sha256sum /tmp/review-fixes-full.patch
          test "$(wc -c < /tmp/review-fixes-full.patch)" -eq 80486
          echo "0243d4b51298aba897b7f0852d425e6f89ae41f798f6f299d2434590d504b8b7  /tmp/review-fixes-full.patch" | sha256sum -c -

          python - <<'PY'
          from pathlib import Path
          source = Path('/tmp/review-fixes-full.patch').read_text()
          sections = []
          current = ''
          for line in source.splitlines(keepends=True):
              if line.startswith('diff --git '):
                  if current:
                      sections.append(current)
                  current = line
              else:
                  current += line
          if current:
              sections.append(current)
          output = ''.join(
              section for section in sections
              if 'src/lib/promises/service.ts' not in section.splitlines()[0]
          )
          Path('/tmp/review-fixes.patch').write_text(output)
          PY

          wc -c /tmp/review-fixes.patch
          sha256sum /tmp/review-fixes.patch
          test "$(wc -c < /tmp/review-fixes.patch)" -eq 69741
          echo "cf8cd7143b46403b59cf01358cd386633bdc968e5efa87c468213569e934021a  /tmp/review-fixes.patch" | sha256sum -c -
          git apply --check /tmp/review-fixes.patch
          git apply /tmp/review-fixes.patch

          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .review-fix .review-fix2
          rm -f .github/workflows/one-shot-promises-review-fixes.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: address payment promises review findings"
          git push origin HEAD:feature/payment-promises-engine

      - name: Upload review-fix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-promises-review-fix-diagnostics
          path: |
            /tmp/review-fix.log
            /tmp/review-fixes-full.patch
            /tmp/review-fixes.patch
          if-no-files-found: ignore
          retention-days: 1

  quality:
    name: Lint, typecheck, tests, migrations, and builds
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awadi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify migration sequence
        run: npm run verify:migrations

      - name: Verify Cloudflare configuration
        run: npm run verify:cloudflare

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply PostgreSQL migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${migration}"
          done < <(find db/migrations -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL integrity tests
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r test_file; do
            echo "Running ${test_file}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${test_file}"
          done < <(find db/tests -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL repository integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/awadi_test
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee postgres-integration-tests.log

      - name: Upload PostgreSQL integration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-integration-diagnostics
          path: postgres-integration-tests.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build Next.js application
        run: npm run build

      - name: Build and validate Cloudflare Worker
        run: npm run cf:check
