name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"
      - "chore/**"
      - "feat/**"
      - "feature/**"
      - "fix/**"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_jsonb_fix:
    name: Apply canonical JSONB idempotency fix
    if: github.ref == 'refs/heads/feature/payment-promises-engine' || github.head_ref == 'feature/payment-promises-engine'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout review branch
        uses: actions/checkout@v5
        with:
          ref: feature/payment-promises-engine
          fetch-depth: 0

      - name: Apply verified JSONB patch
        if: hashFiles('.review-fix4.patch') != ''
        run: |
          set -euo pipefail
          test "$(wc -c < .review-fix4.patch)" -eq 2033
          echo "620a8902cf6802878cbd0d72f87b361c92e8b1d2ce7774f20f9f746f41081739  .review-fix4.patch" | sha256sum -c -
          git apply --check .review-fix4.patch
          git apply .review-fix4.patch

          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .review-fix4.patch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: use canonical JSONB for promise idempotency"
          git push origin HEAD:feature/payment-promises-engine

  quality:
    name: Lint, typecheck, tests, migrations, and builds
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awadi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify migration sequence
        run: npm run verify:migrations

      - name: Verify Cloudflare configuration
        run: npm run verify:cloudflare

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply PostgreSQL migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${migration}"
          done < <(find db/migrations -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL integrity tests
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r test_file; do
            echo "Running ${test_file}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${test_file}"
          done < <(find db/tests -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL repository integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/awadi_test
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee postgres-integration-tests.log

      - name: Upload PostgreSQL integration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-integration-diagnostics
          path: postgres-integration-tests.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build Next.js application
        run: npm run build

      - name: Build and validate Cloudflare Worker
        run: npm run cf:check
