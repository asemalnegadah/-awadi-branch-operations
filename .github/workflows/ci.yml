name: CI

on:
  pull_request:
  push:
    branches:
      - "chore/**"

permissions:
  contents: write

concurrency:
  group: typescript7-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock-typescript7:
    if: github.event_name == 'pull_request' && github.head_ref == 'chore/typescript7-dual-toolchain'
    name: Lock verified TypeScript 7 dual toolchain
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
          show-progress: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Generate the verified dependency graph
        run: >-
          npm install --ignore-scripts --no-audit --no-fund --save-dev --save-exact
          typescript@npm:@typescript/typescript6@6.0.2
          @typescript/native@npm:typescript@7.0.2
          @typescript/typescript6@6.0.2
      - name: Revalidate before committing
        run: |
          npm run typecheck
          npm run typecheck:compat
          npm run lint
          npm run test
      - name: Commit the locked dependency graph
        run: |
          set -euo pipefail
          git config user.name "awadi-typescript-maintainer"
          git config user.email "awadi-typescript-maintainer@users.noreply.github.com"
          git add package.json package-lock.json tsconfig.json
          if git diff --cached --quiet; then
            echo "The verified dependency graph is already committed."
            exit 0
          fi
          git commit -m "build(ts): lock TypeScript 7 and TypeScript 6 compatibility toolchains"
          git push origin HEAD:chore/typescript7-dual-toolchain
