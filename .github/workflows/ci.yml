name: CI

on:
  pull_request:
  push:
    branches:
      - "chore/**"

permissions:
  contents: read

concurrency:
  group: eslint10-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-eslint10:
    if: github.event_name == 'pull_request' && github.head_ref == 'chore/eslint10-ecosystem'
    name: Diagnose ESLint 10 ecosystem
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Generate the candidate dependency graph
        run: >-
          npm install --ignore-scripts --no-audit --no-fund --save-dev --save-exact
          eslint@10.7.0 eslint-config-next@16.2.10
      - name: Capture dependency tree
        run: |
          set +e
          npm ls eslint eslint-config-next typescript-eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin --all --json > eslint10-tree.json 2> eslint10-tree.stderr
          echo "$?" > eslint10-tree.exit
          exit 0
      - name: Capture lint diagnostics
        run: |
          set +e
          npm run lint > eslint10-lint.log 2>&1
          echo "$?" > eslint10-lint.exit
          exit 0
      - name: Capture TypeScript and test diagnostics
        run: |
          set +e
          npm run typecheck > eslint10-typescript7.log 2>&1
          echo "$?" > eslint10-typescript7.exit
          npm run typecheck:compat > eslint10-typescript6.log 2>&1
          echo "$?" > eslint10-typescript6.exit
          npm run test > eslint10-tests.log 2>&1
          echo "$?" > eslint10-tests.exit
          exit 0
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eslint10-ecosystem-diagnostics
          path: |
            package-lock.json
            eslint10-tree.json
            eslint10-tree.stderr
            eslint10-tree.exit
            eslint10-lint.log
            eslint10-lint.exit
            eslint10-typescript7.log
            eslint10-typescript7.exit
            eslint10-typescript6.log
            eslint10-typescript6.exit
            eslint10-tests.log
            eslint10-tests.exit
          retention-days: 1
      - name: Enforce candidate health
        run: |
          test "$(cat eslint10-tree.exit)" = "0"
          test "$(cat eslint10-lint.exit)" = "0"
          test "$(cat eslint10-typescript7.exit)" = "0"
          test "$(cat eslint10-typescript6.exit)" = "0"
          test "$(cat eslint10-tests.exit)" = "0"
