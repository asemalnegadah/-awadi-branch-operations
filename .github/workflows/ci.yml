name: CI

on:
  pull_request:
  push:
    branches:
      - "chore/**"

permissions:
  contents: write

concurrency:
  group: eslint-compatible-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock-eslint-compatible:
    if: github.event_name == 'pull_request' && github.head_ref == 'chore/eslint10-ecosystem'
    name: Lock the latest Next-compatible ESLint ecosystem
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
          show-progress: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Generate the compatible dependency graph
        run: >-
          npm install --ignore-scripts --no-audit --no-fund --save-dev --save-exact
          eslint@9.39.5 eslint-config-next@16.2.10
      - name: Verify peer dependency health
        run: npm ls eslint eslint-config-next typescript-eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
      - name: Validate lint, dual typechecks, and tests
        run: |
          npm run lint
          npm run typecheck
          npm run typecheck:compat
          npm run test
      - name: Commit the tested dependency graph
        run: |
          set -euo pipefail
          git config user.name "awadi-eslint-maintainer"
          git config user.email "awadi-eslint-maintainer@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "build(eslint): lock the latest Next-compatible ecosystem"
          git push origin HEAD:chore/eslint10-ecosystem
