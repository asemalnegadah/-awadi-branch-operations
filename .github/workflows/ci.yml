name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"
      - "chore/**"
      - "feat/**"
      - "fix/**"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  align-node-runtime:
    if: github.event_name == 'pull_request' && github.head_ref == 'chore/node24-runtime-baseline'
    name: Align Node.js 24 runtime declarations
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
          show-progress: false
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Regenerate the locked Node type dependency
        run: npm install --ignore-scripts --no-audit --no-fund --save-dev --save-exact @types/node@24.13.3
      - name: Align every workflow runtime declaration
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          workflow_dir = Path('.github/workflows')
          for path in sorted(workflow_dir.glob('*.y*ml')):
              text = path.read_text()
              updated = re.sub(
                  r'(node-version:\s*["\']?)22(?:\.x)?(["\']?)',
                  r'\g<1>24\g<2>',
                  text,
              )
              path.write_text(updated)
          PY
      - name: Verify runtime inventory and project behavior
        run: |
          npm run verify:node-runtime
          npm run lint
          npm run typecheck
          npm run test
      - name: Restore canonical CI shape with Node.js 24 and commit
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git show origin/main:.github/workflows/ci.yml \
            | sed -E 's/(node-version:[[:space:]]*["'"']?)22(\.x)?(["'"']?)/\124\3/g' \
            > .github/workflows/ci.yml
          git config user.name "awadi-runtime-maintainer"
          git config user.email "awadi-runtime-maintainer@users.noreply.github.com"
          git add package.json package-lock.json .nvmrc .node-version scripts/verify-node-runtime.mjs .github/workflows
          git commit -m "build(node): standardize all toolchains on Node.js 24 LTS"
          git push origin HEAD:chore/node24-runtime-baseline

  quality:
    name: Lint, typecheck, tests, migrations, and builds
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awadi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          show-progress: false
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify Node.js runtime consistency
        run: npm run verify:node-runtime

      - name: Verify migration sequence
        run: npm run verify:migrations

      - name: Verify Cloudflare configuration
        run: npm run verify:cloudflare

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply PostgreSQL migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${migration}"
          done < <(find db/migrations -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL integrity tests
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r test_file; do
            echo "Running ${test_file}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${test_file}"
          done < <(find db/tests -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL repository integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/awadi_test
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee postgres-integration-tests.log

      - name: Upload PostgreSQL integration diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: postgres-integration-diagnostics
          path: postgres-integration-tests.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build Next.js application
        run: npm run build

      - name: Build and validate Cloudflare Worker
        run: npm run cf:check
