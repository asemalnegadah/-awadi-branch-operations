name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"
      - "chore/**"
      - "feat/**"
      - "fix/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, tests, migrations, and builds
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awadi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify migration sequence
        run: npm run verify:migrations

      - name: Verify Cloudflare configuration
        run: npm run verify:cloudflare

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply PostgreSQL migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${migration}"
          done < <(find db/migrations -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL integrity tests
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          while IFS= read -r test_file; do
            echo "Running ${test_file}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${test_file}"
          done < <(find db/tests -maxdepth 1 -type f -name '*.sql' -print | LC_ALL=C sort)

      - name: PostgreSQL repository integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/awadi_test
        run: npm run test:integration

      - name: Build Next.js application
        run: npm run build

      - name: Build and validate Cloudflare Worker
        run: npm run cf:check
