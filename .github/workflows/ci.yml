name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "chore/**"
      - "feat/**"
      - "fix/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, migrations, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: awadi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d awadi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply PostgreSQL migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for migration in db/migrations/*.sql; do
            echo "Applying ${migration}"
            psql \
              --host localhost \
              --port 5432 \
              --username postgres \
              --dbname awadi_test \
              --set ON_ERROR_STOP=1 \
              --file "${migration}"
          done

      - name: Build
        run: npm run build
