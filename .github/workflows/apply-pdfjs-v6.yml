name: Apply PDF.js v6 update

on:
  push:
    branches:
      - chore/deps-pdfjs-v6
    paths:
      - .github/workflows/apply-pdfjs-v6.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
          show-progress: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund --save-exact pdfjs-dist@6.1.200
      - name: Commit generated manifest and lockfile
        run: |
          set -euo pipefail
          rm .github/workflows/apply-pdfjs-v6.yml
          git config user.name "awadi-dependency-bot"
          git config user.email "awadi-dependency-bot@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/apply-pdfjs-v6.yml
          git commit -m "build(deps): update PDF.js to 6.1.200"
          git push origin HEAD:chore/deps-pdfjs-v6
