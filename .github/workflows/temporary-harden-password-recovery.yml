name: Temporary harden password recovery

on:
  push:
    branches:
      - agent/email-password-recovery

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/email-password-recovery
          fetch-depth: 0

      - name: Apply reviewed hardening patch
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/lib/auth/postgres-password-reset-service.ts")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  """    WHERE action = 'auth.password_reset.request'\n      AND resource_type = 'AUTHENTICATION'\n      AND resource_id = ${normalizedEmail}\n      AND occurred_at > now() - interval '1 hour'\n""",
                  """    WHERE action = 'auth.password_reset.request'\n      AND resource_type = 'AUTHENTICATION'\n      AND resource_id = ${normalizedEmail}\n      AND result <> 'DENIED'\n      AND occurred_at > now() - interval '1 hour'\n""",
              ),
              (
                  """    WHERE action = 'auth.password_reset.request'\n      AND ip_address = ${context.ipAddress}\n      AND occurred_at > now() - interval '1 hour'\n""",
                  """    WHERE action = 'auth.password_reset.request'\n      AND ip_address = ${context.ipAddress}\n      AND result <> 'DENIED'\n      AND occurred_at > now() - interval '1 hour'\n""",
              ),
              (
                  """  const userCountRows = await sql<CountRow[]>`\n    SELECT COUNT(*)::integer AS count\n""",
                  """  await sql`\n    SELECT pg_advisory_xact_lock(\n      hashtextextended('awadi-initial-manager-bootstrap', 0)\n    )\n  `;\n\n  const userCountRows = await sql<CountRow[]>`\n    SELECT COUNT(*)::integer AS count\n""",
              ),
          ]

          changed = False
          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)
                  changed = True
              elif new not in text:
                  raise SystemExit("Expected password-recovery patch context was not found")

          if changed:
              path.write_text(text, encoding="utf-8")

      - name: Commit patch when needed
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "ChatGPT engineering agent"
          git config user.email "actions@users.noreply.github.com"
          git add src/lib/auth/postgres-password-reset-service.ts
          git commit -m "fix(auth): harden initial manager recovery concurrency"
          git push origin HEAD:agent/email-password-recovery
