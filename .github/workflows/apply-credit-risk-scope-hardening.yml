name: Apply credit risk scope hardening

on:
  push:
    branches:
      - feature/credit-risk-engine
    paths:
      - .github/workflows/apply-credit-risk-scope-hardening.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/credit-risk-engine
          fetch-depth: 0

      - name: Move scope verification before idempotent replay
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/risk/postgres-recalculation-repository.ts')
          text = path.read_text(encoding='utf-8')
          old = '''  return sql.begin(async (transaction) => {
    const replay = await findByIdempotencyKey(transaction, context.idempotencyKey, true);
    if (replay) {
      assertSameOperation(replay, customerAccountId);
      return Object.freeze({ assessment: mapAssessmentRow(replay), replayed: true });
    }

    const accountLock = await transaction.unsafe<{ id: string }[]>(
      `SELECT id FROM customer_accounts WHERE id = $1::uuid FOR UPDATE`,
      [customerAccountId],
    );
    if (!accountLock[0]) throw new CreditRiskNotFoundError("لم يتم العثور على حساب العميل.");

    const replayAfterLock = await findByIdempotencyKey(
      transaction,
      context.idempotencyKey,
      true,
    );
    if (replayAfterLock) {
      assertSameOperation(replayAfterLock, customerAccountId);
      return Object.freeze({ assessment: mapAssessmentRow(replayAfterLock), replayed: true });
    }

    const derived = await deriveCreditRiskInputPostgres(
      transaction,
      customerAccountId,
      representativeScopeId,
    );
'''
          new = '''  return sql.begin(async (transaction) => {
    const accountLock = await transaction.unsafe<{ id: string }[]>(
      `SELECT id FROM customer_accounts WHERE id = $1::uuid FOR UPDATE`,
      [customerAccountId],
    );
    if (!accountLock[0]) throw new CreditRiskNotFoundError("لم يتم العثور على حساب العميل.");

    const derived = await deriveCreditRiskInputPostgres(
      transaction,
      customerAccountId,
      representativeScopeId,
    );

    const replay = await findByIdempotencyKey(transaction, context.idempotencyKey, true);
    if (replay) {
      assertSameOperation(replay, customerAccountId);
      return Object.freeze({ assessment: mapAssessmentRow(replay), replayed: true });
    }
'''
          if old not in text:
              raise SystemExit('target recalculation transaction block not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Commit hardening
        run: |
          git config user.name "awadi-ci-bot"
          git config user.email "awadi-ci-bot@users.noreply.github.com"
          git add src/lib/risk/postgres-recalculation-repository.ts
          git commit -m "fix: verify risk record scope before replay"
          git push origin HEAD:feature/credit-risk-engine
