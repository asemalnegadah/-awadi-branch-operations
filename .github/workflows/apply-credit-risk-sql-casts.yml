name: Apply credit risk SQL cast fixes

on:
  push:
    branches:
      - feature/credit-risk-engine
    paths:
      - .github/workflows/apply-credit-risk-sql-casts.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/credit-risk-engine
          fetch-depth: 0

      - name: Apply targeted fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('src/lib/risk/postgres-recalculation-repository.ts'): [
                  ("'ruleset_version', $8,", "'ruleset_version', $8::text,"),
                  ("'currency_code', $9,", "'currency_code', $9::text,"),
                  ("'operating_mode', $10", "'operating_mode', $10::text"),
              ],
              Path('src/lib/risk/postgres-decision-repository.ts'): [
                  ("jsonb_build_object('operating_mode', $12)", "jsonb_build_object('operating_mode', $12::text)"),
              ],
              Path('src/lib/risk/postgres-assessment-repository.ts'): [
                  ("'ruleset_version', $8,", "'ruleset_version', $8::text,"),
                  ("'currency_code', $9", "'currency_code', $9::text"),
              ],
          }

          changed = False
          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  if old in text:
                      text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed = True
                  print(f'patched {path}')
              else:
                  print(f'no changes needed in {path}')

          if not changed:
              print('all targeted casts were already present')
          PY

      - name: Commit fixes
        run: |
          if git diff --quiet; then
            echo "No patch commit required"
            exit 0
          fi
          git config user.name "awadi-ci-bot"
          git config user.email "awadi-ci-bot@users.noreply.github.com"
          git add src/lib/risk/postgres-recalculation-repository.ts \
                  src/lib/risk/postgres-decision-repository.ts \
                  src/lib/risk/postgres-assessment-repository.ts
          git commit -m "fix: cast credit risk audit metadata parameters"
          git push origin HEAD:feature/credit-risk-engine
