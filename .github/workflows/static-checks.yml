name: Static and unit checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Lint, typecheck, and unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --silent --no-audit --no-fund

      - name: Verify migration sequence
        run: npm run verify:migrations

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: |
          set +e
          npm run typecheck -- --pretty false > typecheck.log 2>&1
          code=$?
          echo "${code}" > typecheck.exit
          exit 0

      - name: Unit tests
        run: |
          set +e
          npm run test -- --reporter=verbose > unit-tests.log 2>&1
          code=$?
          echo "${code}" > unit-tests.exit
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-unit-diagnostics
          path: |
            typecheck.log
            typecheck.exit
            unit-tests.log
            unit-tests.exit
          if-no-files-found: error
          retention-days: 7

      - name: Enforce check results
        run: |
          typecheck_code="$(cat typecheck.exit)"
          unit_code="$(cat unit-tests.exit)"
          if [ "${typecheck_code}" != "0" ] || [ "${unit_code}" != "0" ]; then
            cat typecheck.log
            cat unit-tests.log
            exit 1
          fi
