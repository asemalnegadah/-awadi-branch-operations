name: One-shot promises implementation

on:
  push:
    branches:
      - feature/payment-promises-engine

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/payment-promises-engine
          fetch-depth: 0

      - name: Verify and apply reviewed Promises Engine patch
        if: hashFiles('.patches/payment-promises.patch.part13') != ''
        run: |
          set -euo pipefail
          parts=(.patches/payment-promises.patch.part{00..13})
          for part in "${parts[@]}"; do
            test -f "$part"
          done
          cat "${parts[@]}" > /tmp/payment-promises.patch
          test "$(wc -c < /tmp/payment-promises.patch)" -eq 240036
          echo "50e329d41fa0240626908e9ba47e8117e7e4a2ae5be0c900ff0bbd7102a29f6e  /tmp/payment-promises.patch" | sha256sum -c -
          git apply --check /tmp/payment-promises.patch
          git apply /tmp/payment-promises.patch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add db/migrations/0016_payment_promises_engine.sql
          git commit -m "feat: add payment promises database model"

          git add src/lib/auth/permissions.ts \
            src/lib/promises/api.ts \
            src/lib/promises/errors.ts \
            src/lib/promises/postgres-repository.ts \
            src/lib/promises/presentation.ts \
            src/lib/promises/service.ts \
            src/lib/promises/types.ts \
            src/lib/promises/validation.ts
          find src/app/api/v1/promises -type f ! -name '*.test.ts' -print0 | xargs -0 git add
          git commit -m "feat: implement payment promises services and APIs"

          git add src/app/promises src/app/dashboard/page.tsx
          git commit -m "feat: add payment promises user interface"

          git add db/tests/0016_payment_promises_engine_smoke.sql \
            docs/RBAC_MATRIX.md \
            docs/requirements/payment-promises-engine.md \
            src/lib/promises/validation.test.ts \
            src/lib/promises/service.test.ts \
            src/lib/promises/presentation.test.ts \
            src/lib/promises/postgres-repository.integration.test.ts \
            src/app/api/v1/promises/route.test.ts
          git commit -m "test: cover payment promises financial integrity"

          rm -rf .patches
          rm -f .github/workflows/one-shot-promises-implementation.yml
          git add -A
          git commit -m "chore: remove temporary implementation transport"
          git push origin HEAD:feature/payment-promises-engine
