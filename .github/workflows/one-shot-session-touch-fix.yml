name: One-shot session touch fix

on:
  push:
    branches:
      - security/auth-session-hardening

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: security/auth-session-hardening
          fetch-depth: 0

      - name: Apply exact reviewed patch
        run: |
          python - <<'PY'
          from pathlib import Path

          service_path = Path('src/lib/auth/postgres-auth-service.ts')
          service = service_path.read_text()
          old_touch = '''  if (touch) {
              await sql`
                UPDATE user_sessions SET last_seen_at = now()
                WHERE id = ${row.session_id} AND last_seen_at < now() - interval '5 minutes'
              `;
            }
          '''
          new_touch = '''  if (touch) {
              const touchIntervalMinutes = Math.max(
                1,
                Math.min(5, Math.floor(idleTimeoutMinutes / 2)),
              );
              await sql`
                UPDATE user_sessions SET last_seen_at = now()
                WHERE id = ${row.session_id}
                  AND last_seen_at < now() - (${touchIntervalMinutes} * interval '1 minute')
              `;
            }
          '''
          if old_touch not in service:
              raise SystemExit('Expected session touch block was not found exactly once.')
          if service.count(old_touch) != 1:
              raise SystemExit('Session touch block is ambiguous.')
          service_path.write_text(service.replace(old_touch, new_touch))

          test_path = Path('src/lib/auth/postgres-auth-review-fixes.integration.test.ts')
          test = test_path.read_text()
          constants_old = '''const staleEmail = "credential.version.drift@example.test";
          const idleEmail = "idle.audit.integration@example.test";
          const oldPassword = "Old-Password-For-Review-2026";
          '''
          constants_new = '''const staleEmail = "credential.version.drift@example.test";
          const idleEmail = "idle.audit.integration@example.test";
          const touchEmail = "idle.touch.minimum@example.test";
          const oldPassword = "Old-Password-For-Review-2026";
          '''
          if constants_old not in test:
              raise SystemExit('Expected review test constants were not found.')
          test = test.replace(constants_old, constants_new, 1)

          users_old = '''    [staleEmail, "اختبار تغير نسخة كلمة المرور"],
              [idleEmail, "اختبار تدقيق انتهاء الخمول"],
            ] as const) {
          '''
          users_new = '''    [staleEmail, "اختبار تغير نسخة كلمة المرور"],
              [idleEmail, "اختبار تدقيق انتهاء الخمول"],
              [touchEmail, "اختبار تحديث الجلسة النشطة"],
            ] as const) {
          '''
          if users_old not in test:
              raise SystemExit('Expected review test users were not found.')
          test = test.replace(users_old, users_new, 1)

          anchor = '''  it("يبقي رسالة المصادقة الخارجية موحدة بعد تغير نسخة الاعتماد", async () => {
          '''
          new_test = '''  it("يحدث الجلسة النشطة قبل مهلة الخمول الدنيا", async () => {
              const login = await loginPostgres(
                sql,
                { email: touchEmail, password: oldPassword },
                context("127.0.4.13"),
                { authSecret, sessionTtlHours: 8, sessionIdleTimeoutMinutes: 5 },
              );
              await sql`
                UPDATE user_sessions
                SET last_seen_at = now() - interval '4 minutes'
                WHERE id = ${login.session.id}
              `;

              const loaded = await getAuthenticatedSessionByToken(
                sql,
                login.token,
                authSecret,
                5,
                context("127.0.4.14"),
              );
              expect(loaded?.id).toBe(login.session.id);

              const rows = await sql<
                { revoked_at: Date | null; refreshed: boolean }[]
              >`
                SELECT
                  revoked_at,
                  last_seen_at > now() - interval '1 minute' AS refreshed
                FROM user_sessions
                WHERE id = ${login.session.id}
              `;
              expect(rows[0]).toEqual({ revoked_at: null, refreshed: true });
            });

          '''
          if anchor not in test:
              raise SystemExit('Expected review test insertion anchor was not found.')
          test_path.write_text(test.replace(anchor, new_test + anchor, 1))
          PY

      - name: Commit exact patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/auth/postgres-auth-service.ts src/lib/auth/postgres-auth-review-fixes.integration.test.ts
          git commit -m "security: refresh active sessions before idle expiry"
          git push origin HEAD:security/auth-session-hardening
