name: One-shot promises review fixes

on:
  push:
    branches:
      - feature/payment-promises-engine

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feature/payment-promises-engine
          fetch-depth: 0

      - name: Apply verified review fixes
        if: hashFiles('.review-fix/part08') != ''
        run: |
          set -euo pipefail
          parts=(.review-fix/part{00..08})
          for part in "${parts[@]}"; do
            test -f "$part"
          done
          cat "${parts[@]}" > /tmp/review-fixes.patch
          test "$(wc -c < /tmp/review-fixes.patch)" -eq 80486
          echo "0243d4b51298aba897b7f0852d425e6f89ae41f798f6f299d2434590d504b8b7  /tmp/review-fixes.patch" | sha256sum -c -
          git apply --check /tmp/review-fixes.patch
          git apply /tmp/review-fixes.patch

          rm -rf .review-fix
          rm -f .github/workflows/one-shot-promises-review-fixes.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: address payment promises review findings"
          git push origin HEAD:feature/payment-promises-engine
