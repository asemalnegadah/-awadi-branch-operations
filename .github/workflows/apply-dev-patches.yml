name: Apply development patch updates

on:
  push:
    branches:
      - chore/deps-dev-patches
    paths:
      - .github/workflows/apply-dev-patches.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
          show-progress: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: >-
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --save-exact
          vitest@4.1.10 wrangler@4.112.0
      - name: Commit generated manifest and lockfile
        run: |
          set -euo pipefail
          rm .github/workflows/apply-dev-patches.yml
          git config user.name "awadi-dependency-bot"
          git config user.email "awadi-dependency-bot@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/apply-dev-patches.yml
          git commit -m "build(deps-dev): update Vitest and Wrangler patches"
          git push origin HEAD:chore/deps-dev-patches
